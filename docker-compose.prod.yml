services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to the ECR image URI}
    environment:
      - MONGO_URI=mongodb://mongo:27017/idolTracker
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - NLP_MODE=${NLP_MODE:-cheap}
      - NLP_PROVIDER=${NLP_PROVIDER:-groq}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      - NLP_ARTICLE_MAX_CHARS=${NLP_ARTICLE_MAX_CHARS:-800}
      - NLP_ALLOW_RULE_FALLBACK=${NLP_ALLOW_RULE_FALLBACK:-false}
      - NEWS_AUTO_FETCH_MAX_RESULTS=${NEWS_AUTO_FETCH_MAX_RESULTS:-25}
      - NEWS_AUTO_PROCESS_MAX_RESULTS=${NEWS_AUTO_PROCESS_MAX_RESULTS:-}
      - NEWS_AUTO_PROCESS_CONCURRENCY=${NEWS_AUTO_PROCESS_CONCURRENCY:-4}
      - NEWS_AUTO_FETCH_FALLBACK_DAYS=${NEWS_AUTO_FETCH_FALLBACK_DAYS:-30}
      - NEWS_AUTO_FETCH_LANGUAGE=${NEWS_AUTO_FETCH_LANGUAGE:-eng}
      - OPEN_AI_KEY=${OPEN_AI_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mongo:
    image: mongodb/mongodb-community-server:latest
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
