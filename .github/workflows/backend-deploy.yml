name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "deploy/**"
      - "tests/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "poetry.lock"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongodb/mongodb-community-server:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Prepare EC2 SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload compose and nginx config
        run: |
          ssh ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} "mkdir -p /opt/idoltracker/deploy/nginx"
          scp docker-compose.prod.yml ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:/opt/idoltracker/docker-compose.prod.yml
          scp deploy/nginx/nginx.conf ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:/opt/idoltracker/deploy/nginx/nginx.conf

      - name: Deploy on EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          ssh ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} "cd /opt/idoltracker && \
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY && \
            BACKEND_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG docker compose --env-file .env -f docker-compose.prod.yml pull backend && \
            BACKEND_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG docker compose --env-file .env -f docker-compose.prod.yml up -d"
